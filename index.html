<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portafolio Kelvin Corporán</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="Componentes/fontawesome-free-5.9.0-web/css/all.min.css" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      background-color: #ffffff;
      font-family: 'Montserrat', sans-serif;
    }

    .wrapper {
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
    }

    /* ── Blobs ── */
    .blob {
      position: absolute;
      pointer-events: none;
      user-select: none;
    }

    .blob-top-right {
      top: -6%;
      right: -4%;
      width: 62%;
    }

    .blob-bottom-left {
      bottom: -4%;
      left: -2%;
      width: 75%;
    }

    /* ── Content ── */
    .content {
      position: relative;
      z-index: 10;
      padding: 2rem;
      margin-left: 14%;
    }

    .content h1 {
      font-size: clamp(2rem, 6vw, 5.5rem);
      font-weight: 800;
      color: #0F3443;
      line-height: 1.1;
      letter-spacing: -0.5px;
    }

    .content p {
      margin-top: 0.6rem;
      font-size: clamp(1rem, 2.5vw, 2.2rem);
      font-weight: 400;
      color: #1a4a5c;
      letter-spacing: 0.2px;
    }

    /* ── Social icons ── */
    .social {
      position: absolute;
      bottom: 4%;
      left: 6%;
      display: flex;
      align-items: center;
      gap: clamp(0.6rem, 1.5vw, 1.2rem);
      z-index: 10;
    }

    .social a {
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.2s ease, transform 0.2s ease;
      color: #ffffff;
      text-decoration: none;
    }

    .social a:hover {
      opacity: 0.75;
      transform: scale(1.1);
    }

    .social a i {
      font-size: clamp(1.6rem, 3.5vw, 3rem);
    }

    /* ── Tablet (≤ 768px) ── */
    @media (max-width: 768px) {
      .blob-top-right {
        width: 75%;
        top: -4%;
        right: -4%;
      }

      .blob-bottom-left {
        width: 85%;
        left: -3%;
        bottom: -3%;
      }

      .content { margin-left: 8%; }
      .social { left: 8%; bottom: 5%; }
    }

    /* ── Mobile (≤ 480px) ── */
    @media (max-width: 480px) {
      .blob-top-right {
        width: 92%;
        top: -2%;
        right: -2%;
      }

      .blob-bottom-left {
        width: 108%;
        left: -2%;
        bottom: -2%;
      }

      .content {
        margin-left: 6%;
        margin-top: -4vh;
      }

      .social {
        left: 5%;
        bottom: 3%;
        gap: 1rem;
      }

      .social a i { font-size: 1.8rem; }
    }
  </style>
</head>
<body>
  <div class="wrapper">

    <img class="blob blob-top-right" src="Componentes/baloom.svg" alt="" aria-hidden="true"/>
    <img class="blob blob-bottom-left" src="Componentes/baloom2.svg" alt="" aria-hidden="true"/>

    <div class="content">
      <h1>Muy Pronto..</h1>
      <p>Portafolio Kelvin Corporán</p>
    </div>

    <div class="social">
      <a href="https://github.com/kcorporangomez" target="_blank" rel="noopener" aria-label="GitHub">
        <i class="fab fa-github"></i>
      </a>
      <a href="https://www.instagram.com/kelvincorporangomez" target="_blank" rel="noopener" aria-label="Instagram">
        <i class="fab fa-instagram"></i>
      </a>
      <a href="https://www.linkedin.com/in/kcorporangomez" target="_blank" rel="noopener" aria-label="LinkedIn">
        <i class="fab fa-linkedin"></i>
      </a>
    </div>

  </div>
</body>
</html>
